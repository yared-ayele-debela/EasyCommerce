<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Location Access Required</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #locationAlert {
            display: none;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="text-center">
    <h2 class="mb-4">Welcome to Our Website</h2>
    <p class="mb-3">To provide the best experience, we need your location.</p>
    <button class="btn btn-primary" onclick="getUserLocation()">Allow Location</button>

    <div id="locationAlert" class="alert alert-danger mt-4" role="alert">
        Location access is required to continue using this site.
    </div>

    <div id="locationSuccess" class="alert alert-success mt-4" role="alert" style="display: none;">
        Thank you! Your location is: <span id="coordinates"></span>
    </div>
</div>

<script>
    function getUserLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function (position) {
                    // Success: show coordinates
                    const coords = position.coords.latitude + ", " + position.coords.longitude;
                    document.getElementById('coordinates').innerText = coords;
                    document.getElementById('locationSuccess').style.display = 'block';
                    document.getElementById('locationAlert').style.display = 'none';

                    // TODO: Send location to server with AJAX if needed
                },
                function (error) {
                    if (error.code === error.PERMISSION_DENIED) {
                        document.getElementById('locationAlert').style.display = 'block';
                    }
                }
            );
        } else {
            alert("Geolocation is not supported by this browser.");
        }
    }

    // Optionally auto-trigger location prompt on page load
    window.onload = function () {
        getUserLocation();
    };
</script>

</body>
</html>
