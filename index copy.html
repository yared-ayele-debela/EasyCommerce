<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Advertisement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .ad-overlay {
      background: rgba(0, 0, 0, 0.5); /* dark overlay */
      color: #fff;
      padding: 5rem;
      border-radius: 0.5rem;
    }

    .ad-container {
      position: relative;
      overflow: hidden;
      border-radius: 0.5rem;
    }

    .ad-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 90%;
    }

    @media (max-width: 576px) {
      .ad-text {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-12 col-md-12">
      <div class="ad-container">
        <img src="https://placehold.co/1530x300" class="img-fluid w-100" alt="Ad Image">
        <div class="ad-text ad-overlay">
          <h2 class="fw-bold">Limited Time Offer!</h2>
          <p class="mb-3">Get up to 50% off on our best-selling products. Offer ends soon.</p>
          <a href="#" class="btn btn-warning fw-bold">Shop Now</a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
