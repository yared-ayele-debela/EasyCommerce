<!DOCTYPE html>
<html>
<head>
  <title>Leaflet Live Search in Ethiopia</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map {
      height: 90vh;
    }
    #search-container {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 5px;
    }
    #search-input {
      width: 300px;
      padding: 5px;
    }
    #suggestions {
      border: 1px solid #ccc;
      border-top: none;
      max-height: 150px;
      overflow-y: auto;
      display: none;
      position: absolute;
      background: white;
      width: 300px;
    }
    #suggestions div {
      padding: 5px;
      cursor: pointer;
    }
    #suggestions div:hover {
      background-color: #eee;
    }
  </style>
</head>
<body>

<div id="search-container">
  <input type="text" id="search-input" placeholder="Search in Ethiopia..." autocomplete="off">
  <div id="suggestions"></div>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([9.03, 38.74], 6); // Ethiopia center

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  let marker;

  const searchInput = document.getElementById('search-input');
  const suggestionsBox = document.getElementById('suggestions');

  searchInput.addEventListener('input', async () => {
    const query = searchInput.value.trim();
    if (query.length < 3) {
      suggestionsBox.style.display = 'none';
      suggestionsBox.innerHTML = '';
      return;
    }

    // Fetch from Nominatim with country code "ET"
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=ET&q=${encodeURIComponent(query)}`;

    const res = await fetch(url);
    const places = await res.json();

    suggestionsBox.innerHTML = '';
    if (places.length > 0) {
      places.forEach(place => {
        const div = document.createElement('div');
        div.textContent = place.display_name;
        div.addEventListener('click', () => {
          if (marker) map.removeLayer(marker);
          const lat = parseFloat(place.lat);
          const lon = parseFloat(place.lon);
          marker = L.marker([lat, lon]).addTo(map)
            .bindPopup(place.display_name)
            .openPopup();
          map.setView([lat, lon], 14);
          suggestionsBox.innerHTML = '';
          suggestionsBox.style.display = 'none';
          searchInput.value = place.display_name;
        });
        suggestionsBox.appendChild(div);
      });
      suggestionsBox.style.display = 'block';
    } else {
      suggestionsBox.style.display = 'none';
    }
  });

  // Hide suggestions if user clicks outside
  document.addEventListener('click', (e) => {
    if (!document.getElementById('search-container').contains(e.target)) {
      suggestionsBox.style.display = 'none';
    }
  });
</script>

</body>
</html>
