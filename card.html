<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bank Account Card UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    .bank-card {
      max-width: 400px;
      margin: 50px auto;
      border-radius: 20px;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      padding: 30px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
      font-family: 'Segoe UI', sans-serif;
    }

    .bank-card .card-chip {
      width: 50px;
    }

    .bank-card .bank-name {
      font-size: 1.2rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .bank-card .account-number {
      font-size: 1.1rem;
      letter-spacing: 2px;
      margin: 15px 0;
    }

    .bank-card .card-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }

    .bank-card .balance {
      margin-top: 20px;
      font-size: 1rem;
    }

    .balance-value {
      font-weight: bold;
      font-size: 1.3rem;
    }

    .toggle-eye {
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="bank-card">
  <div class="d-flex justify-content-between align-items-center">
    <img src="https://img.icons8.com/color/48/000000/sim-card-chip.png" class="card-chip" alt="chip" />
    <div class="bank-name">Ethiopian Bank</div>
  </div>

  <div class="account-number">
    Account: **** **** 5678
  </div>

  <div class="card-info">
    <div>
      <div class="text-uppercase text-muted">Account Holder</div>
      <div class="font-weight-bold">Yared Ayele</div>
    </div>
    <div>
      <div class="text-uppercase text-muted">Branch</div>
      <div>Addis Ababa</div>
    </div>
  </div>

  <div class="balance d-flex justify-content-between align-items-center">
    <div>Available Balance</div>
    <div>
      <span id="balanceAmount" class="balance-value">ETB 12,345.67</span>
      <i id="toggleBalance" class="fas fa-eye toggle-eye ml-2"></i>
    </div>
  </div>
</div>

<!-- Bootstrap 4 JS & dependencies -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
  $(document).ready(function () {
    let isVisible = true;
    $('#toggleBalance').click(function () {
      if (isVisible) {
        $('#balanceAmount').text('•••••••••');
        $(this).removeClass('fa-eye').addClass('fa-eye-slash');
      } else {
        $('#balanceAmount').text('ETB 12,345.67');
        $(this).removeClass('fa-eye-slash').addClass('fa-eye');
      }
      isVisible = !isVisible;
    });
  });
</script>
</body>
</html>
