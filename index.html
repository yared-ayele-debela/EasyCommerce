<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Slider and Categories</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container my-4">
    <div class="row">
      <!-- Slider Section -->
      <div class="col-md-8">
        <div id="ecommerceSlider" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="https://via.placeholder.com/800x400" class="d-block w-100" alt="Banner 1">
              <div class="carousel-caption d-none d-md-block">
                <h5>Slide 1</h5>
                <p>Shop the latest deals.</p>
              </div>
            </div>
            <div class="carousel-item">
              <img src="https://via.placeholder.com/800x400" class="d-block w-100" alt="Banner 2">
              <div class="carousel-caption d-none d-md-block">
                <h5>Slide 2</h5>
                <p>Exclusive offers await you.</p>
              </div>
            </div>
            <div class="carousel-item">
              <img src="https://via.placeholder.com/800x400" class="d-block w-100" alt="Banner 3">
              <div class="carousel-caption d-none d-md-block">
                <h5>Slide 3</h5>
                <p>Discover new arrivals.</p>
              </div>
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#ecommerceSlider" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#ecommerceSlider" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>

      <!-- Categories Section -->
      <div class="col-md-4">
        <div class="row g-3">
          <!-- Category Card 1 -->
          <div class="col-6">
            <div class="card py-1">
              <div class="card-body text-center">
                <h6 class="card-title">Electronics</h6>
                <h6>Discount 10%</h6>

              </div>
            </div>
          </div>
          <!-- Category Card 2 -->
          <div class="col-6">
            <div class="card py-1">
              <div class="card-body text-center">
                <h6 class="card-title">Fashion</h6>
                <h6>Discount 10%</h6>

              </div>
            </div>
          </div>
          <!-- Category Card 3 -->
          <div class="col-6">
            <div class="card py-1">
              <div class="card-body text-center">
                <h6 class="card-title">Home Appliances</h6>
                <h6>Discount 10%</h6>

              </div>
            </div>
          </div>
          <!-- Category Card 4 -->
          <div class="col-6">
            <div class="card py-1">
              <div class="card-body text-center">
                <h6 class="card-title">Books</h6>
                <h6>Discount 10%</h6>

              </div>
            </div>
          </div>
          <!-- Category Card 5 -->
          <div class="col-6">
            <div class="card py-1">
              <div class="card-body text-center">
                <h6 class="card-title">Sports</h6>
                <h6>Discount 10%</h6>

              </div>
            </div>
          </div>
          <div class="col-6">
            <div class="card py-1">
              <div class="card-body text-center">
                <h6 class="card-title">Sports</h6>
                <h6>Discount 10%</h6>

              </div>
            </div>
          </div>
          <div class="col-6">
            <div class="card py-1">
              <div class="card-body text-center">
                <h6 class="card-title">Sports</h6>
                <h6>Discount 10%</h6>

              </div>
            </div>
          </div>
          <div class="col-6">
            <div class="card py-1">
              <div class="card-body text-center">
                <p class="card-title">Sports</p>
                <h6>Discount 10%</h6>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
