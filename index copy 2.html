<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .onboard-container {
      max-width: 400px;
      width: 100%;
      height: 100%;
      text-align: center;
      padding: 2rem 1rem;
    }
    .onboard-title {
      color: #00C853;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .onboard-image {
      width: 100%;
      max-height: 250px;
      object-fit: contain;
      margin-bottom: 1.5rem;
    }
    .onboard-heading {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .onboard-subtext {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 2rem;
    }
    .dot {
      height: 10px;
      width: 10px;
      margin: 0 5px;
      background-color: #ccc;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.active {
      background-color: #00C853;
    }
  </style>
</head>
<body>
  <div class="onboard-container">
<div style="
  background-image: url('image.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  width: 400px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgb(63, 193, 16);
  font-size: 2rem;
  font-weight: bold;
">
  Easy Hotel Booking
</div>

    <!-- Replace src with your actual SVG/image -->
    <img src="img.png" alt="Onboarding Image" class="onboard-image">

    <div class="onboard-heading">Comfortable Stays at Affordable Prices</div>
    <div class="onboard-subtext">You can stay at luxury hotels for an affordable price</div>

    <div class="d-flex justify-content-between align-items-center">
      <a href="#" class="text-muted">Skip</a>
      <div>
        <span class="dot"></span>
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
      <a href="#" class="btn btn-success px-4">Next</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
