<!DOCTYPE html>
<html>
  <head>
    <title>Location Picker</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

  </head>
  <body>
    <h2>Select Location</h2>

    <!-- Map Container -->
    <div id="map" style="height: 400px;"></div>

    <!-- Latitude & Longitude Inputs -->
    <div class="mt-3">
        <label>Latitude:</label>
        <input type="text" id="latitude" class="form-control" readonly>

        <label>Longitude:</label>
        <input type="text" id="longitude" class="form-control" readonly>
    </div>

    <!-- Include Leaflet.js -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Initialize map centered on Addis Ababa (9.03° N, 38.74° E)
        var map = L.map('map').setView([9.03, 38.74], 12);

        // Add OpenStreetMap tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var marker;

        // Event listener for map click
        map.on('click', function (e) {
            var lat = e.latlng.lat.toFixed(6);
            var lng = e.latlng.lng.toFixed(6);

            // Update input fields
            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lng;

            // Remove existing marker
            if (marker) {
                map.removeLayer(marker);
            }

            // Add new marker at clicked location
            marker = L.marker([lat, lng]).addTo(map)
                .bindPopup("Latitude: " + lat + "<br>Longitude: " + lng)
                .openPopup();
        });
    });
    </script>
  </body>
</html>
